<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amoled Notes PWA</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <header id="main-header">
            <div class="header-left">
                <button id="btn-back" class="icon-btn hidden" aria-label="Volver">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </button>
                <h1 id="app-title">Notas</h1>
            </div>
            <div class="header-right">
                <button id="btn-theme" class="icon-btn" aria-label="Cambiar Tema">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
                <button id="btn-color" class="icon-btn hidden" aria-label="Cambiar Color">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S18.67 9 17.5 9s-1.5.67-1.5 1.5.67 1.5 1.5 1.5z"/></svg>
                </button>
                <div id="color-palette" class="hidden">
                    <div class="color-dot" data-color="#ff4d4d" style="background:#ff4d4d"></div>
                    <div class="color-dot" data-color="#4dff4d" style="background:#4dff4d"></div>
                    <div class="color-dot" data-color="#4da6ff" style="background:#4da6ff"></div>
                    <div class="color-dot" data-color="#b366ff" style="background:#b366ff"></div>
                    <div class="color-dot" data-color="#ffb347" style="background:#ffb347"></div>
                    <div class="color-dot" data-color="#ffff66" style="background:#ffff66"></div>
                    <div class="color-dot" data-color="#4dffff" style="background:#4dffff"></div>
                    <div class="color-dot" data-color="#ff66b3" style="background:#ff66b3"></div>
                </div>
                <button id="btn-add-note" class="icon-btn" aria-label="Añadir Nota">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                <button id="btn-folders" class="icon-btn" aria-label="Carpetas">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
                </button>
                <button id="btn-settings" class="icon-btn" aria-label="Ajustes">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                </button>
            </div>
        </header>

        <nav id="tabs-bar" class="hidden">
            <div class="tabs-container"></div>
        </nav>

        <main id="main-content">
            <div id="grid-view" class="view active">
                <div id="notes-grid" class="cols-4"></div>
            </div>

            <div id="editor-view" class="view hidden">
                <div class="editor-toolbar">
                    <input type="text" id="note-title-input" placeholder="Título..." autocomplete="off">
                    <button id="btn-add-image" class="icon-btn" aria-label="Imagen">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </button>
                </div>
                <div id="note-editor" contenteditable="true" data-placeholder="Escribe aquí... Usa [[Nota]] para enlazar."></div>
            </div>
            
            <div id="settings-view" class="view hidden">
                <h2>Ajustes</h2>
                <div class="setting-item">
                    <label for="zoom-slider">Zoom del Tablero</label>
                    <div style="display:flex;align-items:center;gap:10px;">
                        <span>-</span>
                        <input type="range" id="zoom-slider" min="2" max="10" value="4" step="1" style="flex-grow:1;">
                        <span>+</span>
                    </div>
                </div>
                <div class="setting-item">
                    <label for="font-size-slider">Tamaño de fuente (Editor)</label>
                    <input type="range" id="font-size-slider" min="12" max="32" value="16" step="1">
                    <span id="font-size-val">16px</span>
                </div>
            </div>
        </main>
        
        <input type="file" id="image-upload" accept="image/*" class="hidden">
    </div>

    <script src="store.js"></script>
    <script src="dragdrop.js"></script>
    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    console.log('SW registered!', reg);
                }).catch(err => console.log('SW reg failed', err));
            });
        }
    </script>
</body>
</html>
